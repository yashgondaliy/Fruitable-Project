<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <style>
    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(120deg, #89f7fe, #66a6ff);
    }

    .login-container {
      background-color: #fff;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }

    .login-container h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #333;
    }

    .login-container input {
      width: 100%;
      padding: 0.75rem;
      margin-bottom: 1rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
    }

    .login-container button {
      width: 100%;
      padding: 0.75rem;
      background-color: #007bff;
      color: white;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .login-container button:hover {
      background-color: #0056b3;
    }

    .forgot {
      text-align: center;
      font-size: 0.9rem;
      margin-top: 1rem;
      margin-bottom: 1rem;
    
    }

    .forgot a {
      color: #007bff;
      text-decoration: none;
    }

    .forgot a:hover {
      text-decoration: underline;
    }

    .sign {
      text-align: right;
      font-size: 0.9rem;
      margin=top: 0rem;
      margin-bottom: 1rem;
    }
    .sign a {
      color: #007bff;
      text-decoration: underline;
    }

  </style>
</head>
<body>
  <div class="login-container">
    <h2>Login</h2>
    <form action="{% url 'login' %}" method="POST">
        {% csrf_token %}
        {% if msg2 %}
          <p style="color:red; text-align:center;">{{ msg2 }}</p>
        {% endif %}
      <input type="email" name="email" placeholder="Email" required />
      <input type="password" name="password" placeholder="Password" required />
      <div class="sign" ><a href="{% url 'forget_pass' %}"><u>Forget Password?</u></a></div>
      <button type="submit">Login </button>  
      <div class="forgot" > Don't have an account? <a href="{% url 'register' %}"><u>Sign up</u></a></div>
    </form>
  </div>
</body>
</html>
